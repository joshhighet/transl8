<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>transl8</title>
  <meta name="description" content="Query syntax translator for network reconnaissance platforms">
  <meta property="og:title" content="transl8" />
  <meta property="og:description" content="Query syntax translator for network reconnaissance platforms" />
  <meta property="og:image" content="assets/opengraph.png" />
  <meta property="og:type" content="website" />
  <link rel="icon" href="assets/shodan.png">

  <!-- Match securitytools: Roboto + Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css" crossorigin="anonymous" />

  <style>
    /* ── securitytools design tokens ───────────────────────────── */
    :root {
      --bg-primary:    #0d1117;
      --bg-secondary:  #161b22;
      --bg-tertiary:   #21262d;
      --border:        #30363d;
      --text-primary:  #e6edf3;
      --text-secondary:#8b949e;
      --text-muted:    #6e7681;
      --accent:        #e63946;
      --accent-dim:    rgba(230, 57, 70, 0.15);
      --link:          #58a6ff;
      --link-hover:    #79c0ff;
      --row-hover:     rgba(255,255,255,0.03);
      --radius:        6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 0;
    }

    /* ── GitHub corner (same as securitytools) ────────────────── */
    .github-corner { position: fixed; top: 0; right: 0; z-index: 100; }
    .github-corner svg { fill: var(--accent); color: #fff; }
    .github-corner:hover .octo-arm { animation: octocat-wave 560ms ease-in-out; }
    @keyframes octocat-wave {
      0%, 100% { transform: rotate(0); }
      20%, 60%  { transform: rotate(-25deg); }
      40%, 80%  { transform: rotate(10deg); }
    }

    /* ── Header ───────────────────────────────────────────────── */
    .site-header {
      background: linear-gradient(180deg, #13191f 0%, var(--bg-primary) 100%);
      border-bottom: 1px solid var(--border);
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
    }

    .site-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin: 0 0 0.4rem;
      letter-spacing: -0.5px;
      color: var(--text-primary);
    }

    .site-header h1 .accent {
      color: var(--accent);
      font-family: 'Courier New', monospace;
      margin-right: 0.25rem;
    }

    .tagline {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin: 0;
    }

    /* ── Content wrapper ──────────────────────────────────────── */
    .content-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
    }

    /* ── Form ─────────────────────────────────────────────────── */
    .form-wrap {
      margin-bottom: 1.5rem;
    }

    .query-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    select, input[type="text"] {
      height: 36px;
      padding: 0 0.6rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-secondary);
      font-size: 0.875rem;
      font-family: inherit;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    select option {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    select:focus, input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    input[type="text"]::placeholder {
      color: var(--text-muted);
    }

    .op-select    { width: 88px; }
    .op-spacer    { width: 88px; flex-shrink: 0; }
    .kw-select    { width: 164px; }
    .value-input  { flex: 1; min-width: 0; }
    .country-select { flex: 1; min-width: 0; }

    button {
      cursor: pointer;
      border: none;
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-family: inherit;
      line-height: 1;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .btn-icon:hover { background: var(--bg-tertiary); color: var(--text-primary); }

    .btn-primary {
      height: 36px;
      padding: 0 0.875rem;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }
    .btn-primary:hover { background: #c62f3b; }

    .btn-outline {
      height: 36px;
      padding: 0 0.875rem;
      background: var(--bg-secondary);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-outline:hover { border-color: var(--text-secondary); color: var(--text-primary); }

    .controls {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.25rem;
    }

    /* ── Results ──────────────────────────────────────────────── */
    .results-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }

    .provider-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.5rem 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      transition: border-color 0.15s;
    }

    .provider-card:hover { border-color: var(--text-muted); }
    .provider-card.unavailable { opacity: 0.4; }
    .provider-card.unavailable:hover { border-color: var(--border); }

    .provider-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      min-width: 148px;
    }

    .provider-info a {
      display: flex;
      align-items: center;
      color: var(--link);
      text-decoration: none;
    }
    .provider-info a:hover { color: var(--link-hover); }

    .provider-info img {
      width: 20px;
      height: 20px;
      object-fit: contain;
      border-radius: 3px;
    }

    .provider-name {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-primary);
      font-family: 'Courier New', monospace;
    }

    .query-output {
      flex: 1;
      min-width: 0;
      font-family: 'SF Mono', 'Consolas', 'Menlo', 'Courier New', monospace;
      font-size: 0.75rem;
      padding: 0.35rem 0.6rem;
      border-radius: 4px;
      overflow-x: auto;
      white-space: nowrap;
    }

    .query-output.ok  { background: var(--bg-primary); color: #58a6ff; border: 1px solid var(--border); }
    .query-output.err { background: var(--bg-primary); color: #f87171; border: 1px solid rgba(248,113,113,0.2); }

    .card-actions {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      flex-shrink: 0;
    }

    .btn-copy {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      color: var(--text-muted);
      border-radius: 4px;
    }
    .btn-copy:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .btn-copy.copied { color: #22c55e; }

    .btn-open {
      height: 26px;
      padding: 0 0.6rem;
      font-size: 0.75rem;
      background: var(--accent);
      color: #fff;
      border-radius: 4px;
      font-weight: 600;
    }
    .btn-open:hover { background: #c62f3b; }

    /* ── Tooltip ──────────────────────────────────────────────── */
    .has-tip { position: relative; }

    .has-tip::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-tertiary);
      color: var(--text-primary);
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 20;
    }

    .has-tip:hover::after { opacity: 1; }

    /* ── Empty state ─────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.875rem;
      padding: 2rem 0;
    }

    /* ── Footer ──────────────────────────────────────────────── */
    .site-footer {
      text-align: center;
      padding: 1.5rem 1rem;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.78rem;
    }

    .site-footer a {
      color: var(--link);
      text-decoration: none;
      font-size: inherit;
    }
    .site-footer a:hover { color: var(--link-hover); text-decoration: underline; }

    /* ── Responsive ───────────────────────────────────────────── */
    @media (max-width: 768px) {
      .site-header { padding: 1.5rem 1rem 1rem; }
      .site-header h1 { font-size: 1.4rem; }
      .content-wrapper { padding: 1rem 0.5rem 2rem; }
      .provider-info { min-width: 100px; }
      .provider-name { font-size: 0.75rem; }
      .query-output { font-size: 0.68rem; }
      .op-select { width: 72px; }
      .op-spacer { width: 72px; }
      .kw-select { width: 120px; }
    }
  </style>
</head>
<body>

  <!-- GitHub corner -->
  <a href="https://github.com/joshhighet/transl8" class="github-corner" aria-label="view source on GitHub" target="_blank" rel="noopener">
    <svg width="72" height="72" viewBox="0 0 250 250" aria-hidden="true">

      <path d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.4,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z" fill="currentColor" class="octo-body"></path>
    </svg>
  </a>

  <!-- Header -->
  <header class="site-header">
    <h1><span class="accent">//</span> transl8</h1>
    <p class="tagline">query syntax translator for network reconnaissance platforms</p>
  </header>

  <div class="content-wrapper">
    <!-- Form -->
    <div class="form-wrap">
      <div id="form-rows"></div>
      <div class="controls">
        <button class="btn-primary" id="add-btn">+ add</button>
        <button class="btn-outline" id="clear-btn">clear</button>
      </div>
    </div>

    <!-- Results -->
    <div class="results-wrap" id="results"></div>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <a href="https://github.com/joshhighet/transl8" target="_blank" rel="noopener">joshhighet/transl8</a>
  </footer>

  <script src="app.js"></script>
</body>
</html>
